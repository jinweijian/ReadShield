server:
  transport: stdio
  profile: prod
  audit_log: /var/log/support-mcp/audit.log

security:
  require_login: true
  token_ttl_minutes: 480
  deny_by_default: true
  allow_shell: false
  allow_write_tools: false
  max_response_bytes: 200000

limits:
  command_timeout_sec: 5
  logs_tail_max_lines: 1000
  logs_search_max_matches: 200

targets:
  nginx_error:
    path: /var/log/support-mcp/nginx/error.log
    allowed_tools: [logs.tail, logs.search]
  nginx_access:
    path: /var/log/support-mcp/nginx/access.log
    allowed_tools: [logs.tail, logs.search]
  php_prod:
    path: /var/log/support-mcp/php/prod.log
    allowed_tools: [logs.tail, logs.search]

services:
  nginx:
    unit: nginx.service
  php-fpm:
    unit: php8.1-fpm.service
  mysql:
    unit: mysql.service
